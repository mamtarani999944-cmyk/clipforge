<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login &ndash; ClipForge</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f5f5f7;color:#111;min-height:100vh;display:flex;align-items:center;justify-content:center}

.login-card{background:#fff;border:1px solid #e5e5e7;border-radius:18px;padding:2.5rem 2rem;width:100%;max-width:380px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,0.06)}

.logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:2rem}
.logo-box{width:32px;height:32px;background:#111;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;font-weight:900}
.logo-text{font-size:1.15rem;font-weight:900;color:#111}

.login-title{font-size:1.35rem;font-weight:800;color:#111;margin-bottom:0.5rem}
.login-sub{font-size:0.88rem;color:#888;margin-bottom:2rem}

.google-btn{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;background:#fff;border:1.5px solid #e0e0e2;border-radius:10px;padding:0.85rem 1.25rem;font-size:0.92rem;font-weight:600;color:#111;cursor:pointer;font-family:inherit;transition:all 0.15s;text-decoration:none}
.google-btn:hover{border-color:#999;background:#fafafa;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.google-btn svg{flex-shrink:0}

.divider{display:flex;align-items:center;gap:12px;margin:1.5rem 0;color:#ccc;font-size:0.78rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#eee}

.features{text-align:left;display:flex;flex-direction:column;gap:0.6rem;margin-bottom:1.75rem}
.feature{display:flex;align-items:center;gap:10px;font-size:0.82rem;color:#666}
.feature-icon{width:22px;height:22px;background:#f0f0f2;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}

.footer-note{font-size:0.72rem;color:#bbb;margin-top:1.5rem}
.footer-note a{color:#888;text-decoration:none}
</style>
</head>
<body>

<div class="login-card">
  <div class="logo">
    <div class="logo-box">&#9889;</div>
    <div class="logo-text">ClipForge</div>
  </div>

  <div class="login-title">Welcome back</div>
  <div class="login-sub">Sign in to generate viral clips from your videos</div>

  <div class="features">
    <div class="feature"><div class="feature-icon">&#9889;</div> Generate clips in seconds</div>
    <div class="feature"><div class="feature-icon">&#127897;</div> Save & manage your clips</div>
    <div class="feature"><div class="feature-icon">&#128202;</div> Track virality analytics</div>
  </div>

  <a href="/auth/google" class="google-btn">
    <svg width="18" height="18" viewBox="0 0 18 18">
      <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
      <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
      <path fill="#FBBC05" d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z"/>
      <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z"/>
    </svg>
    Continue with Google
  </a>

  <div class="footer-note">By signing in you agree to our <a href="#">Terms</a> &amp; <a href="#">Privacy Policy</a></div>
</div>

</body>
</html>
