<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ClipForge &ndash; Sign in</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f5f5f7;color:#111;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
.card{background:#fff;border:1px solid #e5e5e7;border-radius:20px;padding:2.5rem 2rem;width:100%;max-width:400px}
.logo{display:flex;align-items:center;gap:8px;font-size:1.1rem;font-weight:900;color:#111;margin-bottom:2rem;justify-content:center}
.logo-box{width:28px;height:28px;background:#111;border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px}
h1{font-size:1.3rem;font-weight:800;color:#111;margin-bottom:0.35rem;text-align:center}
.sub{font-size:0.84rem;color:#aaa;text-align:center;margin-bottom:1.75rem}
.btn-google{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;background:#fff;border:1px solid #e0e0e2;border-radius:10px;padding:0.75rem;font-size:0.88rem;font-weight:600;color:#111;cursor:pointer;font-family:inherit;transition:all 0.15s;text-decoration:none;margin-bottom:1.25rem}
.btn-google:hover{background:#fafafa;border-color:#bbb}
.google-icon{width:18px;height:18px;flex-shrink:0}
.divider{display:flex;align-items:center;gap:0.75rem;margin-bottom:1.25rem}
.divider-line{flex:1;height:1px;background:#e5e5e7}
.divider-text{font-size:0.76rem;color:#bbb;font-weight:500;white-space:nowrap}
.field{margin-bottom:0.85rem}
.field label{display:block;font-size:0.74rem;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:0.35rem}
.field input{width:100%;background:#f5f5f7;border:1px solid #e0e0e2;border-radius:9px;padding:0.65rem 0.9rem;font-size:0.88rem;font-family:inherit;color:#111;outline:none;transition:border-color 0.15s}
.field input:focus{border-color:#999;background:#fff}
.field input::placeholder{color:#ccc}
.btn-submit{width:100%;background:#111;color:#fff;border:none;border-radius:10px;padding:0.75rem;font-size:0.9rem;font-weight:700;cursor:pointer;font-family:inherit;transition:background 0.15s;margin-top:0.25rem}
.btn-submit:hover{background:#333}
.switch{text-align:center;margin-top:1.25rem;font-size:0.82rem;color:#aaa}
.switch a{color:#111;font-weight:600;text-decoration:none}
.switch a:hover{text-decoration:underline}
.error{background:#fff5f5;border:1px solid #fecaca;border-radius:8px;padding:0.65rem 0.85rem;color:#dc2626;font-size:0.82rem;font-weight:500;margin-bottom:1rem;display:none}
.error.show{display:block}
.forgot{font-size:0.76rem;color:#aaa;text-align:right;margin-top:-0.5rem;margin-bottom:0.85rem}
.forgot a{color:#888;text-decoration:none}
.forgot a:hover{color:#111}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-box">&#9889;</div>
    ClipForge
  </div>
  <h1>Welcome back</h1>
  <p class="sub">Sign in to your account</p>

  {% if error %}
  <div class="error show">{{ error }}</div>
  {% endif %}

  <a href="/auth/google" class="btn-google">
    <svg class="google-icon" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Continue with Google
  </a>

  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-text">or sign in with email</div>
    <div class="divider-line"></div>
  </div>

  <form method="POST" action="/login">
    <div class="field">
      <label>Email</label>
      <input type="email" name="email" placeholder="you@email.com" required />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" name="password" placeholder="Your password" required />
    </div>
    <div class="forgot"><a href="#">Forgot password?</a></div>
    <button type="submit" class="btn-submit">Sign in</button>
  </form>

  <div class="switch">
    Don't have an account? <a href="/signup">Create one</a>
  </div>
</div>
</body>
</html>
